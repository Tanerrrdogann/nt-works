apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cloud-storage-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: cloud-storage-platform/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cloud-storage-platform
spec:
  selector:
    app: auth-service
  ports:
    - name: https
      port: 8080
      targetPort: 8080
    - name: management
      port: 9001
      targetPort: 9001

