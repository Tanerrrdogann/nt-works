global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - auth-service:9001

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:9002

  - job_name: storage-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - storage-service:9003

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692
