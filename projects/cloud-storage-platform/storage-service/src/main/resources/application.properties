server.port=8082
server.servlet.context-path=/api/v1
spring.application.name=storage-service

spring.config.import=optional:vault://
spring.cloud.vault.uri=http://127.0.0.1:8200
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=storage-service
spring.cloud.vault.token=${VAULT_TOKEN:}

spring.datasource.url=jdbc:postgresql://localhost:5434/storagedb
spring.datasource.username=postgres
spring.datasource.password=${STORAGE_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.rabbitmq.template.mandatory=true
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

spring.servlet.multipart.max-file-size=${STORAGE_MAX_FILE_SIZE:250MB}
spring.servlet.multipart.max-request-size=${STORAGE_MAX_REQUEST_SIZE:260MB}

storage.local.root=${STORAGE_LOCAL_ROOT:./storage-data}
storage.encryption.key=${STORAGE_ENCRYPTION_KEY:dev-only-change-this-32-byte-key!!}
storage.replication.enabled=${STORAGE_REPLICATION_ENABLED:false}
storage.replication.target=${STORAGE_REPLICATION_TARGET:minio}
storage.replication.s3.endpoint=${STORAGE_REPLICATION_S3_ENDPOINT:http://localhost:9000}
storage.replication.s3.region=${STORAGE_REPLICATION_S3_REGION:us-east-1}
storage.replication.s3.bucket=${STORAGE_REPLICATION_S3_BUCKET:storage-replica}
storage.replication.s3.access-key=${STORAGE_REPLICATION_S3_ACCESS_KEY:minioadmin}
storage.replication.s3.secret-key=${STORAGE_REPLICATION_S3_SECRET_KEY:minioadmin}
storage.gc.fixed-delay-ms=${STORAGE_GC_FIXED_DELAY_MS:60000}

management.endpoints.web.exposure.include=health,prometheus,metrics
management.server.port=9003
management.server.ssl.enabled=false
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.vault.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html
