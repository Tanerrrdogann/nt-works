server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:gateway-keystore.p12
server.ssl.key-store-password=${gateway.server.ssl.key-store-password}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=1

spring.application.name=api-gateway

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

logging.level.org.springframework.cloud.gateway=INFO

management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,prometheus,metrics
management.server.port=9002
management.server.ssl.enabled=false
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}

resilience4j.timelimiter.configs.default.timeout-duration=2s
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cloud.vault.uri=http://localhost:8200
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=api-gateway
spring.config.import=vault://

services.auth.url=https://localhost:8080
services.tasks.url=${TASKS_SERVICE_URL:https://localhost:8081}
services.storage.url=${STORAGE_SERVICE_URL:http://localhost:8082}

spring.cloud.gateway.server.webflux.httpclient.ssl.use-insecure-trust-manager=false
spring.cloud.gateway.server.webflux.httpclient.ssl.key-store=classpath:gateway-client.p12
spring.cloud.gateway.server.webflux.httpclient.ssl.key-store-password=${gateway.client.ssl.key-store-password}
spring.cloud.gateway.server.webflux.httpclient.ssl.key-store-type=PKCS12
spring.cloud.gateway.server.webflux.httpclient.ssl.trusted-x509-certificates=classpath:rootCA.pem

