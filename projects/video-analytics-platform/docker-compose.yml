services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-video_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_user} -d ${POSTGRES_DB:-video_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://video_user:video_password@postgres:5432/video_analytics}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: /app/storage
      UPLOAD_STORAGE_DIR: /app/storage/uploads
      SNAPSHOT_STORAGE_DIR: /app/storage/snapshots
      TEMP_STORAGE_DIR: /app/storage/temp
      DEFAULT_SAMPLING_PROFILE: ${DEFAULT_SAMPLING_PROFILE:-LOW}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${VIDEO_API_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./apps/worker
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://video_user:video_password@postgres:5432/video_analytics}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: /app/storage
      UPLOAD_STORAGE_DIR: /app/storage/uploads
      SNAPSHOT_STORAGE_DIR: /app/storage/snapshots
      TEMP_STORAGE_DIR: /app/storage/temp
      DEFAULT_SAMPLING_PROFILE: ${DEFAULT_SAMPLING_PROFILE:-LOW}
      ENABLE_TRANSCRIPTION: ${ENABLE_TRANSCRIPTION:-false}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=INFO

  scheduler:
    build:
      context: ./apps/worker
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://video_user:video_password@postgres:5432/video_analytics}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: /app/storage
      TEMP_STORAGE_DIR: /app/storage/temp
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=INFO

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${VIDEO_WEB_PORT:-3010}:3000"

volumes:
  postgres_data:
