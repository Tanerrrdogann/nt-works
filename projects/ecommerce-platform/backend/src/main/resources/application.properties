spring.application.name=teddy-jewellry-backend
server.port=8081

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:teddyjewellry;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

app.jwt.secret=${JWT_SECRET:teddy-jewellry-dev-secret-key-change-before-production-2026}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.customer.refresh-token-days=${CUSTOMER_REFRESH_TOKEN_DAYS:7}
app.admin.email=${ADMIN_EMAIL:admin@teddyjewellry.com}
app.admin.password=${ADMIN_PASSWORD:Admin12345!}
app.store.instagram=${STORE_INSTAGRAM:teddyjewellry}
app.shipping.carrier=${SHIPPING_CARRIER:S\u00fcrat Kargo}
app.shipping.fee=${SHIPPING_FEE:99.90}
app.shipping.free-item-threshold=${SHIPPING_FREE_ITEM_THRESHOLD:2}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ismailtanererdogan54@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from-name=${MAIL_FROM_NAME:Teddy Jewellry}
app.mail.admin-recipient=${MAIL_ADMIN_RECIPIENT:${spring.mail.username}}
app.backend.public-url=${APP_BACKEND_PUBLIC_URL:http://localhost:8081}
app.upload.product-image-dir=${APP_UPLOAD_PRODUCT_IMAGE_DIR:uploads/products}
