server {
  server_name ntwebcozumleri.com.tr www.ntwebcozumleri.com.tr;

  client_max_body_size 64m;

  root /var/www/nt-works/deploy/static-demos;

  location ^~ /kurumsal-web-sitesi/ {
    alias /var/www/nt-works/deploy/static-demos/kurumsal-web-sitesi/;
    try_files $uri $uri/ /kurumsal-web-sitesi/index.html;
  }

  location = /kurumsal-web-sitesi {
    return 301 /kurumsal-web-sitesi/;
  }

  location ^~ /landing-page/ {
    alias /var/www/nt-works/deploy/static-demos/landing-page/;
    try_files $uri $uri/ /landing-page/index.html;
  }

  location = /landing-page {
    return 301 /landing-page/;
  }

  location ^~ /randevu-rezervasyon-sistemi/ {
    alias /var/www/nt-works/deploy/static-demos/randevu-rezervasyon-sistemi/;
    try_files $uri $uri/ /randevu-rezervasyon-sistemi/index.html;
  }

  location = /randevu-rezervasyon-sistemi {
    return 301 /randevu-rezervasyon-sistemi/;
  }

  location ^~ /whatsapp-siparis-katalog/ {
    alias /var/www/nt-works/deploy/static-demos/whatsapp-siparis-katalog/;
    try_files $uri $uri/ /whatsapp-siparis-katalog/index.html;
  }

  location = /whatsapp-siparis-katalog {
    return 301 /whatsapp-siparis-katalog/;
  }

  location ^~ /admin-panelli-isletme-sistemi/ {
    alias /var/www/nt-works/deploy/static-demos/admin-panelli-isletme-sistemi/;
    try_files $uri $uri/ /admin-panelli-isletme-sistemi/index.html;
  }

  location = /admin-panelli-isletme-sistemi {
    return 301 /admin-panelli-isletme-sistemi/;
  }

  location ^~ /ecommerce-platform {
    proxy_pass http://127.0.0.1:4107/ecommerce-platform;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /ecommerce-platform {
    proxy_pass http://127.0.0.1:4107/ecommerce-platform;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /cloud-storage-platform/api/v1/auth/ {
    proxy_pass http://127.0.0.1:5080/api/v1/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /cloud-storage-platform/api/v1/admin/ {
    proxy_pass http://127.0.0.1:5080/api/v1/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /cloud-storage-platform/api/v1/moderator/ {
    proxy_pass http://127.0.0.1:5080/api/v1/moderator/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /cloud-storage-platform/api/v1/tasks/ {
    proxy_pass http://127.0.0.1:5080/api/v1/tasks/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /cloud-storage-platform/api/v1/objects/ {
    proxy_pass http://127.0.0.1:5082/api/v1/objects/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Authenticated-User demo.user;
    proxy_set_header X-Authenticated-Role ROLE_ADMIN;
  }

  location = /cloud-storage-platform/api/v1/objects {
    proxy_pass http://127.0.0.1:5082/api/v1/objects;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Authenticated-User demo.user;
    proxy_set_header X-Authenticated-Role ROLE_ADMIN;
  }

  location ^~ /cloud-storage-platform/ {
    proxy_pass http://127.0.0.1:4101/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
