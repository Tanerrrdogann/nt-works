services:
  auth-db:
    mem_limit: 256m

  storage-db:
    mem_limit: 256m

  rabbitmq:
    mem_limit: 384m

  redis:
    mem_limit: 128m

  vault:
    mem_limit: 256m

  vault-seed:
    mem_limit: 128m

  minio:
    mem_limit: 384m

  auth-service:
    mem_limit: 640m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -Xms128m -Xmx384m"

  storage-service:
    mem_limit: 640m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -Xms128m -Xmx384m"

  api-gateway:
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -Xms96m -Xmx256m"

  frontend:
    mem_limit: 192m
